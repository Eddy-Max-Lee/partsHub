<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PartsHub 台灣汽車零件</title><link rel="stylesheet" href="styles.css"></head><body>
<header class="top"><a class="brand" href="./">PartsHub<span>台灣站</span></a><nav><a class="active" href="./">零件商城</a><a href="admin.html">資料後台</a></nav><button id="cartButton" class="cart-button">購物車 <b id="cartCount">0</b></button></header>
<main><section class="hero"><div><span class="eyebrow">2006 Audi A8 Quattro L・4.2L V8</span><h1>原廠零件資料<br>台灣化展示商城</h1><p>繁體中文、台幣計價、商品詳情相簿與原廠零件分解圖。</p></div><div class="rate-card"><small>示範換算匯率</small><strong>1 USD = NT$32.3582</strong><span>價格已四捨五入至新台幣整數</span></div></section>
<section class="toolbar"><label class="search"><span>⌕</span><input id="searchInput" placeholder="搜尋品名或料號"></label><select id="sortSelect"><option value="diagram">依圖號排序</option><option value="price-asc">價格低到高</option><option value="price-desc">價格高到低</option></select><span id="resultCount">載入中</span></section>
<section id="productGrid" class="product-grid"></section></main>
<div id="modalBackdrop" class="modal-backdrop hidden"><article class="modal"><button id="modalClose" class="modal-close">×</button><div class="gallery"><div class="main-image-wrap"><img id="modalMainImage" alt="商品圖片"><span id="imageBadge"></span></div><div id="thumbnailList" class="thumbnails"></div></div><div class="modal-info"><span id="modalDiagram" class="diagram-label"></span><h2 id="modalName"></h2><code id="modalPart"></code><p id="modalDescription"></p><dl><div><dt>適用年份</dt><dd id="modalYears"></dd></div><div><dt>其他名稱</dt><dd id="modalOther"></dd></div><div><dt>替代料號</dt><dd id="modalReplaces"></dd></div></dl><div class="modal-price"><strong id="modalPrice"></strong><del id="modalMsrp"></del></div><button id="modalAdd" class="primary">加入購物車</button><a id="sourceLink" class="source-link" target="_blank" rel="noreferrer">查看原始商品頁 ↗</a></div></article></div>
<aside id="cartDrawer" class="cart-drawer"><div class="drawer-head"><h2>購物車</h2><button id="cartClose">×</button></div><div id="cartItems"></div><div class="cart-summary"><div><span>商品小計</span><b id="subtotal">NT$0</b></div><div><span>運費</span><b id="shipping">NT$0</b></div><div class="total"><span>合計</span><b id="total">NT$0</b></div><button id="checkoutButton" class="primary">建立示範訂單</button></div></aside><div id="drawerShade" class="drawer-shade hidden"></div>
<div id="toast" class="toast"></div><footer>PartsHub v4.0.0・台灣繁體中文示範・資料來源為公開商品頁</footer>
<script src="config.js"></script><script src="app.js"></script></body></html>
