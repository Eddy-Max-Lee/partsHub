<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PartsHub 資料後台</title><link rel="stylesheet" href="styles.css"><style>.admin{max-width:1240px;margin:auto;padding:30px 20px}.admin-head{display:flex;justify-content:space-between;align-items:end}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.stat,.table-wrap{background:white;border:1px solid var(--line);border-radius:17px;padding:18px}.stat strong{display:block;font-size:30px}.table-wrap{overflow:auto;padding:0}table{border-collapse:collapse;width:100%;min-width:900px}th,td{text-align:left;padding:13px;border-bottom:1px solid var(--line);font-size:13px}th{background:var(--soft)}@media(max-width:700px){.stats{grid-template-columns:1fr 1fr}}</style></head><body><header class="top"><a class="brand" href="index.html">PartsHub<span>台灣站</span></a><nav><a href="index.html">零件商城</a><a class="active" href="admin.html">資料後台</a></nav></header><main class="admin"><div class="admin-head"><div><span class="eyebrow" style="color:#10233f;border-color:#ccd6e2">REST API 管理檢視</span><h1>商品與爬蟲資料</h1></div><b>v4.0.0</b></div><section id="stats" class="stats"></section><section class="table-wrap"><table><thead><tr><th>圖號</th><th>料號</th><th>商品</th><th>台幣價格</th><th>相簿</th><th>來源狀態</th></tr></thead><tbody id="rows"></tbody></table></section></main><script src="config.js"></script><script>const A=window.PARTSHUB_CONFIG.apiBaseUrl;const m=n=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0}).format(n);Promise.all([fetch(A+'/admin/products').then(r=>r.json()),fetch(A+'/admin/source-pages').then(r=>r.json())]).then(([p,s])=>{const images=p.items.reduce((a,x)=>a+x.gallery.length,0);document.querySelector('#stats').innerHTML=`<div class=stat><small>商品</small><strong>${p.count}</strong></div><div class=stat><small>相簿圖片 URL</small><strong>${images}</strong></div><div class=stat><small>已遍歷頁面</small><strong>${s.items.length}</strong></div><div class=stat><small>幣別</small><strong>TWD</strong></div>`;document.querySelector('#rows').innerHTML=p.items.map(x=>`<tr><td>${x.diagram_no}</td><td><code>${x.part_number}</code></td><td><b>${x.name_zh}</b><br><small>${x.name_en}</small></td><td>${m(x.price_twd)}</td><td>${x.gallery.length} 張</td><td>HTTP 200／已入庫</td></tr>`).join('')}).catch(e=>document.querySelector('#rows').innerHTML=`<tr><td colspan=6>API 連線失敗：${e.message}</td></tr>`)</script></body></html>
